```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamilore ❤️</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
color:white;
text-align:center;
overflow-x:hidden;
background:linear-gradient(to top,#2b1055,#7597de,#ffb6c1);
}

/* TORII GATE ENTRANCE */

#entrance{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("torii.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#entrance h1{
background:rgba(0,0,0,.6);
padding:20px 40px;
border-radius:10px;
color:#ffd700;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff4d6d,#ffd700);
cursor:pointer;
margin:10px;
font-weight:bold;
}

/* MOUNT FUJI */

.fuji{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:700px;
height:220px;
background:linear-gradient(#1c1c1c,#000);
clip-path:polygon(
0% 100%,
20% 70%,
35% 55%,
50% 40%,
65% 55%,
80% 70%,
100% 100%
);
opacity:.85;
}

/* LANTERNS */

.lantern{
position:absolute;
top:30px;
font-size:40px;
animation:swing 4s infinite ease-in-out;
}

.lantern.left{left:40px}
.lantern.right{right:40px}

@keyframes swing{
0%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
100%{transform:rotate(-6deg)}
}

/* MAIN CONTENT */

.container{
margin-top:70px;
padding:10px;
position:relative;
z-index:2;
}

h1{color:#ffd700}

h2{color:#ffc0cb}

/* LETTER */

#letter{
display:none;
background:rgba(0,0,0,.8);
padding:25px;
margin:40px auto;
border-radius:20px;
max-width:600px;
line-height:1.7;
text-align:left;
}

#letterText{font-size:17px}

#finalMessage{
display:none;
font-size:26px;
color:#ffd700;
text-align:center;
}

/* PETALS */

.petal{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* PHOTOS */

.photo{
position:absolute;
width:90px;
border-radius:10px;
box-shadow:0 0 15px black;
animation:floatPhoto 10s infinite linear;
}

@keyframes floatPhoto{
0%{transform:translateY(120vh)}
100%{transform:translateY(-120vh)}
}

/* FIREWORK */

.firework{
position:absolute;
font-size:28px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

/* MOBILE */

@media (max-width:700px){

button{width:85%}

#letter{width:90%}

.photo{width:65px}

}

</style>
</head>

<body>

<div class="fuji"></div>

<div class="lantern left">🏮</div>
<div class="lantern right">🏮</div>

<div id="entrance">
<h1>Welcome Tamilore ❤️</h1>
<button onclick="enterSite()">Enter</button>
</div>

<div class="container">

<h1>🎎 Happy Birthday 🎂</h1>
<h2>Tamilore Esther Akiogbe ❤️</h2>

<p>Even though you're in Japan, I built this little world just for you.</p>

<button onclick="toggleLetter()">Read My Letter 💌</button>

<div id="letter">

<h3 style="color:#ffd700;">To My Babe 💌</h3>

<p id="letterText"></p>

<div id="finalMessage">I love you Babe ❤️</div>

</div>

<h2>☀️ A Message For You</h2>
<div id="timeMessage"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

<h2>🌸 Today's Love Note</h2>
<div id="dailyMessage"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

<h2>⏳ Our Love Counter</h2>
<div id="loveCounter"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

</div>

<script>

/* PETALS */

function createPetal(){
let p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
}
setInterval(createPetal,250);

/* ENTER SITE */

function enterSite(){

let password=prompt("Enter the secret password ❤️");

if(password===null || password.toLowerCase()!=="black"){
alert("Wrong password ❤️");
return;
}

document.getElementById("entrance").style.display="none";

startFireworks();
startPhotos();

}

/* FIREWORKS */

function startFireworks(){
setInterval(()=>{
let fire=document.createElement("div");
fire.className="firework";
fire.innerHTML="🎆";
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*50+"vh";
document.body.appendChild(fire);
setTimeout(()=>fire.remove(),1000);
},1500);
}

/* PHOTOS */

function startPhotos(){

let photos=["photo1.jpg","photo2.jpg"];

setInterval(()=>{

let img=document.createElement("img");
img.src=photos[Math.floor(Math.random()*photos.length)];
img.className="photo";
img.style.left=Math.random()*100+"vw";

document.body.appendChild(img);

setTimeout(()=>img.remove(),10000);

},3500);

}

/* LETTER */

let message=`Happy Birthday.

It’s crazy to think we met at school and two years ago we found love.

Even with the break we had, we still found our way back to each other.

I love your personality, your stubborn but sweet nature, and most especially your lovingly shy and cute smile.

One of my favorite memories recently was our karaoke night.

You hold the key to my heart and you have kept it safe.

I will forever love you baby.

I hope one day we travel the world together.

You are my moon in the darkest nights.

Happy Birthday Babe ❤️`;

function toggleLetter(){

let box=document.getElementById("letter");

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";
typeLetter();

}

function typeLetter(){

let text=document.getElementById("letterText");
text.innerHTML="";

let i=0;

function typing(){

if(i<message.length){
text.innerHTML+=message.charAt(i);
i++;
setTimeout(typing,18);
}
else{
document.getElementById("finalMessage").style.display="block";
spellName();
}

}

typing();

}

/* FIREWORK NAME */

function spellName(){

let name="TAMILORE";

for(let i=0;i<name.length;i++){

setTimeout(()=>{

let t=document.createElement("div");

t.innerHTML=name[i];

t.style.position="absolute";
t.style.left=(20+i*8)+"vw";
t.style.top="35vh";
t.style.fontSize="40px";
t.style.color="gold";

document.body.appendChild(t);

},i*600);

}

}

/* TIME OF DAY MESSAGE */

const hour=new Date().getHours();
let greeting="";

if(hour<12){
greeting="☀️ Good morning babe. I hope you woke up smiling today.";
}
else if(hour<18){
greeting="🌤 Good afternoon babe. Just thinking about you and your beautiful smile.";
}
else{
greeting="🌙 Good evening babe. Sleep well tonight, I'm always thinking about you.";
}

document.getElementById("timeMessage").innerText=greeting;

/* DAILY MESSAGE */

const messages=[
"You are my moon in the darkest nights 🌙",
"I hope today brings you happiness and peace ❤️",
"You make life brighter just by being you.",
"I can't wait for the day we travel the world together ✈️",
"Thinking about you today babe ❤️",
"You hold the key to my heart and keep it safe.",
"You are the best thing that happened to me."
];

const today=new Date();
const index=today.getDate()%messages.length;

document.getElementById("dailyMessage").innerText=messages[index];

/* LOVE COUNTER */

let startDate=new Date("2023-07-01"); /* change to your real date */

let now=new Date();

let diff=Math.floor((now-startDate)/(1000*60*60*24));

document.getElementById("loveCounter").innerText=
"Day "+diff+" of loving you ❤️";

</script>

</body>
</html>
```
