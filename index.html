```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamilore ❤️</title>

<style>

/* BODY */

body{
margin:0;
font-family:Segoe UI,Arial;
text-align:center;
color:white;
overflow-x:hidden;
background:linear-gradient(to top,#2b1055,#7597de,#ffb6c1);
}

/* TORII ENTRANCE */

#entrance{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("torii.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#entrance h1{
background:rgba(0,0,0,.6);
padding:20px 40px;
border-radius:12px;
color:#ffd700;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff4d6d,#ffd700);
font-weight:bold;
cursor:pointer;
margin:12px;
}

/* MOUNT FUJI */

.fuji{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:700px;
height:220px;
background:linear-gradient(#1c1c1c,#000);
clip-path:polygon(
0% 100%,
20% 70%,
35% 55%,
50% 40%,
65% 55%,
80% 70%,
100% 100%
);
opacity:.85;
}

/* LANTERNS */

.lantern{
position:absolute;
top:30px;
font-size:40px;
animation:swing 4s infinite ease-in-out;
}

.lantern.left{left:40px}
.lantern.right{right:40px}

@keyframes swing{
0%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
100%{transform:rotate(-6deg)}
}

/* SAKURA TREE */

#tree{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
font-size:80px;
}

/* MAIN */

.container{
margin-top:70px;
padding:10px;
position:relative;
z-index:2;
}

h1{color:#ffd700}

h2{color:#ffc0cb}

/* LETTER */

#letter{
display:none;
background:rgba(0,0,0,.8);
padding:25px;
margin:40px auto;
border-radius:20px;
max-width:600px;
line-height:1.7;
text-align:left;
}

#letterText{font-size:17px}

#finalMessage{
display:none;
font-size:26px;
color:#ffd700;
text-align:center;
}

/* PETALS */

.petal{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* PHOTOS */

.photo{
position:absolute;
width:90px;
border-radius:10px;
box-shadow:0 0 15px black;
animation:floatPhoto 10s infinite linear;
}

@keyframes floatPhoto{
0%{transform:translateY(120vh)}
100%{transform:translateY(-120vh)}
}

/* FIREWORK */

.firework{
position:absolute;
font-size:28px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

/* MOBILE */

@media (max-width:700px){

button{width:85%}

#letter{width:90%}

.photo{width:65px}

#tree{font-size:60px}

}

</style>

</head>

<body>

<div class="fuji"></div>

<div class="lantern left">🏮</div>
<div class="lantern right">🏮</div>

<div id="tree">🌱</div>

<div id="entrance">
<h1>Welcome Tamilore ❤️</h1>
<button onclick="enterSite()">Enter</button>
</div>

<div class="container">

<h1>🎎 Happy Birthday 🎂</h1>
<h2>Tamilore Esther Akiogbe ❤️</h2>

<p>Even though you're in Japan, I built this little world just for you.</p>

<button onclick="toggleLetter()">Read My Letter 💌</button>

<div id="letter">

<h3 style="color:#ffd700;">To My Babe 💌</h3>

<p id="letterText"></p>

<div id="finalMessage">I love you Babe ❤️</div>

</div>

<h2>🇯🇵 Osaka Time</h2>

<div id="japanClock"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

<h2>☀️ A Message For You</h2>

<div id="timeMessage"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

<h2>🌸 Today's Love Note</h2>

<div id="dailyMessage"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

<h2>⏳ Our Love Counter</h2>

<div id="loveCounter"
style="background:rgba(0,0,0,.75);padding:20px;border-radius:15px;max-width:600px;margin:20px auto;">
</div>

</div>

<script>

/* JAPAN TIME */

function getJapanDate(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Tokyo"}));
}

/* LIVE CLOCK */

function updateClock(){

let japan=new Date().toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"});

document.getElementById("japanClock").innerText="Current Time in Osaka 🇯🇵: "+japan;

}

setInterval(updateClock,1000);

updateClock();

/* PETALS */

function createPetal(){

let p=document.createElement("div");

p.className="petal";

p.innerHTML="🌸";

p.style.left=Math.random()*100+"vw";

document.body.appendChild(p);

setTimeout(()=>p.remove(),8000);

}

setInterval(createPetal,250);

/* ENTER */

function enterSite(){

let password=prompt("Enter the secret password ❤️");

if(password===null || password.toLowerCase()!=="black"){
alert("Wrong password ❤️");
return;
}

document.getElementById("entrance").style.display="none";

startFireworks();
startPhotos();

}

/* FIREWORKS */

function startFireworks(){

setInterval(()=>{

let fire=document.createElement("div");

fire.className="firework";

fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";

fire.style.top=Math.random()*50+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

},1500);

}

/* PHOTOS */

function startPhotos(){

let photos=["photo1.jpg","photo2.jpg"];

setInterval(()=>{

let img=document.createElement("img");

img.src=photos[Math.floor(Math.random()*photos.length)];

img.className="photo";

img.style.left=Math.random()*100+"vw";

document.body.appendChild(img);

setTimeout(()=>img.remove(),10000);

},3500);

}

/* LETTER */

let message=`Happy Birthday.

It’s crazy to think we met at school and two years ago we found love.

Even with the break we had, we still found our way back to each other.

I love your personality, your stubborn but sweet nature, and most especially your lovingly shy and cute smile.

One of my favorite memories recently was our karaoke night.

You hold the key to my heart and you have kept it safe.

I will forever love you baby.

I hope one day we travel the world together.

You are my moon in the darkest nights.

Happy Birthday Babe ❤️`;

function toggleLetter(){

let box=document.getElementById("letter");

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";

typeLetter();

}

function typeLetter(){

let text=document.getElementById("letterText");

text.innerHTML="";

let i=0;

function typing(){

if(i<message.length){
text.innerHTML+=message.charAt(i);
i++;
setTimeout(typing,18);
}
else{
document.getElementById("finalMessage").style.display="block";
spellName();
}

}

typing();

}

/* FIREWORK NAME */

function spellName(){

let name="TAMILORE";

for(let i=0;i<name.length;i++){

setTimeout(()=>{

let t=document.createElement("div");

t.innerHTML=name[i];

t.style.position="absolute";

t.style.left=(20+i*8)+"vw";

t.style.top="35vh";

t.style.fontSize="40px";

t.style.color="gold";

document.body.appendChild(t);

},i*600);

}

}

/* JAPAN DATE */

let japanDate=getJapanDate();

/* TIME MESSAGE */

let hour=japanDate.getHours();

let greeting="";

if(hour<12){
greeting="☀️ Good morning babe.";
}
else if(hour<18){
greeting="🌤 Good afternoon babe.";
}
else{
greeting="🌙 Good evening babe.";
}

document.getElementById("timeMessage").innerText=greeting;

/* DAILY NOTE */

const messages=[
"You are my moon in the darkest nights 🌙",
"I hope today brings you happiness ❤️",
"You make life brighter just by being you.",
"I can't wait to travel the world with you.",
"Thinking about you today babe ❤️"
];

document.getElementById("dailyMessage").innerText=
messages[japanDate.getDate()%messages.length];

/* LOVE COUNTER */

let startDate=new Date("2023-07-26");

let diff=Math.floor((japanDate-startDate)/(1000*60*60*24));

document.getElementById("loveCounter").innerText=
"Day "+diff+" of loving you ❤️";

/* SAKURA TREE GROWTH */

let months=(japanDate.getFullYear()-startDate.getFullYear())*12+
(japanDate.getMonth()-startDate.getMonth());

let tree=document.getElementById("tree");

if(months<1) tree.innerHTML="🌱";
else if(months<3) tree.innerHTML="🌿";
else if(months<6) tree.innerHTML="🌳";
else tree.innerHTML="🌸";

/* ANNIVERSARY */

if(japanDate.getDate()===26){

let banner=document.createElement("div");

banner.innerHTML="🎉 Happy Monthly Anniversary Babe ❤️";

banner.style.fontSize="28px";

banner.style.color="gold";

document.querySelector(".container").prepend(banner);

}

</script>

</body>

</html>
```
