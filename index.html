```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamilore's Birthday ❤️</title>

<style>

/* BODY */

body{
margin:0;
font-family:Segoe UI,Arial;
text-align:center;
color:white;
overflow-x:hidden;
background:linear-gradient(to top,#2b1055,#7597de,#ffb6c1);
}

/* TORII ENTRANCE */

#entrance{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("torii.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#entrance h1{
background:rgba(0,0,0,.6);
padding:20px 40px;
border-radius:12px;
color:#ffd700;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff4d6d,#ffd700);
font-weight:bold;
cursor:pointer;
margin:12px;
}

/* MOUNT FUJI */

.fuji{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:700px;
height:240px;
background:linear-gradient(#1c1c1c,#000);
clip-path:polygon(
0% 100%,
20% 70%,
35% 55%,
50% 40%,
65% 55%,
80% 70%,
100% 100%
);
opacity:.85;
z-index:0;
}

/* LANTERNS */

.lantern{
position:absolute;
top:30px;
font-size:40px;
animation:swing 4s ease-in-out infinite;
}

.lantern.left{ left:40px; }
.lantern.right{ right:40px; }

@keyframes swing{
0%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
100%{transform:rotate(-6deg)}
}

/* MAIN CONTENT */

.container{
margin-top:70px;
position:relative;
z-index:3;
padding:10px;
}

/* TITLES */

h1{
color:#ffd700;
text-shadow:0 0 10px gold;
}

h2{
color:#ffc0cb;
}

/* CAKE */

.cake{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* LETTER CARD */

#letter{
display:none;
background:rgba(0,0,0,0.8);
padding:25px;
margin:40px auto;
border-radius:18px;
width:60%;
max-width:600px;
line-height:1.7;
text-align:left;
position:relative;
z-index:5;
}

#letterText{
font-size:17px;
}

#finalMessage{
display:none;
text-align:center;
font-size:28px;
color:#ffd700;
margin-top:15px;
}

/* PETALS */

.petal{
position:absolute;
font-size:20px;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* FIREWORK */

.firework{
position:absolute;
font-size:28px;
animation:explode 1s ease-out forwards;
z-index:1;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

/* FLOATING PHOTOS */

.photo{
position:absolute;
width:90px;
border-radius:10px;
box-shadow:0 0 15px black;
animation:floatPhoto 10s infinite linear;
z-index:1;
}

@keyframes floatPhoto{
0%{transform:translateY(120vh)}
100%{transform:translateY(-120vh)}
}

/* HEART FLOAT */

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* MOBILE FIX */

@media (max-width:700px){

h1{ font-size:26px; }

.cake{ font-size:65px; }

button{
width:85%;
}

#letter{
width:90%;
font-size:15px;
}

#letterText{
font-size:15px;
}

.photo{
width:65px;
}

.firework{
font-size:20px;
}

}

</style>

</head>

<body>

<div class="fuji"></div>

<div class="lantern left">🏮</div>
<div class="lantern right">🏮</div>

<div id="entrance">
<h1>Welcome Tamilore ❤️</h1>
<button onclick="enterSite()">Enter</button>
</div>

<div class="container">

<h1>🎎 Happy Birthday 🎂</h1>
<h2>Tamilore Esther Akiogbe ❤️</h2>

<div style="font-size:22px;">お誕生日おめでとう 🌸</div>

<div class="cake">🎂</div>

<p>Even though you're in Japan, I built this little world just for you.</p>

<button onclick="toggleLetter()">Read My Letter 💌</button>

<div id="letter">

<h3 style="color:#ffd700;">To My Babe 💌</h3>

<p id="letterText"></p>

<div id="finalMessage">I love you Babe ❤️</div>

</div>

</div>

<script>

/* PETALS */

function createPetal(){
let p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
}
setInterval(createPetal,250);

/* ENTER SITE */

function enterSite(){

let password=prompt("Enter the secret password ❤️");

if(password===null || password.toLowerCase()!=="black"){
alert("Wrong password ❤️");
return;
}

document.getElementById("entrance").style.display="none";

startFireworks();
startPhotos();

}

/* FIREWORKS */

function startFireworks(){

setInterval(()=>{

let fire=document.createElement("div");

fire.className="firework";

fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*50+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

},1600);

}

/* FLOATING PHOTOS */

function startPhotos(){

let photos=["photo1.jpg","photo2.jpg"];

setInterval(()=>{

let img=document.createElement("img");

img.src=photos[Math.floor(Math.random()*photos.length)];

img.className="photo";

img.style.left=Math.random()*100+"vw";

document.body.appendChild(img);

setTimeout(()=>img.remove(),10000);

},3500);

}

/* LETTER */

let message=`Happy Birthday.

It’s crazy to think we met at school and two years ago we found love.

Even with the break we had, we still found our way back to each other.

I love your personality, your stubborn but sweet nature, and most especially your lovingly shy and cute smile.

One of my favorite memories recently was our karaoke night.

You hold the key to my heart and you have kept it safe.

I will forever love you baby.

I hope one day we travel the world together.

You are my moon in the darkest nights.

Happy Birthday Babe ❤️`;

function toggleLetter(){

let box=document.getElementById("letter");

if(box.style.display==="block"){
box.style.display="none";
return;
}

box.style.display="block";

typeLetter();

}

function typeLetter(){

let text=document.getElementById("letterText");

text.innerHTML="";

let i=0;

function typing(){

if(i<message.length){

text.innerHTML+=message.charAt(i);
i++;
setTimeout(typing,18);

}else{

document.getElementById("finalMessage").style.display="block";

spellName();

}

}

typing();

}

/* FIREWORK NAME */

function spellName(){

let name="TAMILORE";

for(let i=0;i<name.length;i++){

setTimeout(()=>{

let t=document.createElement("div");

t.innerHTML=name[i];

t.style.position="absolute";
t.style.left=(20+i*8)+"vw";
t.style.top="35vh";
t.style.fontSize="40px";
t.style.color="gold";

document.body.appendChild(t);

},i*600);

}

}

</script>

</body>
</html>
