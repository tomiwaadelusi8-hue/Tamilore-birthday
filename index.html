<style>

80% 70%,
100% 100%

.tree{

bottom:0;

opacity:.9;
}

}

.tree.right{
right:0;
}

animation:lanternSwing 4s ease-in-out infinite;
}

.lantern.left{
left:80px;

.lantern.right{

@keyframes lanternSwing{

}

.star{

height:2px;

animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{

}

h1{

h2{

.cake{

@keyframes bounce{

}

/* PETALS */

.petal{

@keyframes fall{

}

.firework{

animation:explode 1s ease-out forwards;

@keyframes explode{

.spark{

animation:sparkFade 1s linear forwards;
}

@keyframes sparkFade{

100%{opacity:0}
}

</style>

</head>

<div style="font-size:24px;">お誕生日おめでとう 🌸</div>

<script>

/* STARS */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.classList.add("star");
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);
}

/* PASSWORD */

function enterSite(){

let password = prompt("Enter the secret password ❤️");

if(password === null || password.toLowerCase() !== "black"){
alert("Wrong password ❤️");
return;

document.getElementById("entrance").classList.add("fade");

setTimeout(()=>{

startPhotos();

function createPetal(){

let petal=document.createElement("div");
petal.classList.add("petal");
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*5+4)+"s";

fire.style.left=Math.random()*100+"vw";

setTimeout(()=>{fire.remove()},1000);

},1500);

setTimeout(()=>{img.remove()},10000);

},3000);

let message = `Dear Babe,

Happy Birthday.

I wanted to make something special for you.

It’s crazy to think we met at school almost two years ago.

Even with the six-month break we had, we still found our way back to each other.

I love your personality, your stubborn but sweet nature, and especially your smile.

One of my favorite memories recently was our karaoke night last week.

I hope one day we travel the world together.

You are my moon in the darkest nights.

Happy Birthday Babe ❤️`;

function toggleLetter(){

let letter=document.getElementById("letter");

if(letter.style.display==="block"){
letter.style.display="none";
}else{
letter.style.display="block";
typeLetter();
}

}

function typeLetter(){

let textArea=document.getElementById("letterText");
textArea.innerHTML="";
let i=0;

function typing(){

if(i < message.length){
textArea.innerHTML += message.charAt(i);
i++;
setTimeout(typing,18);
}else{

startHearts();
spellName();
}

}

typing();

function spellName(){

let name="TAMILORE";
let startX=20;

for(let i=0;i<name.length;i++){

setTimeout(()=>{
drawLetter(startX+i*7,35,name[i]);
},i*900);

}

}

function drawLetter(x,y,letter){

let text=document.createElement("div");
text.innerHTML=letter;
text.style.position="absolute";
text.style.left=x+"vw";
text.style.top=y+"vh";
text.style.fontSize="70px";
text.style.color="gold";
text.style.textShadow="0 0 20px gold";

document.body.appendChild(text);

for(let i=0;i<80;i++){

setTimeout(()=>{

let spark=document.createElement("div");
spark.classList.add("spark");

spark.style.left=(x + Math.sin(i/5)*2)+"vw";
spark.style.top=(y + Math.cos(i/5)*2)+"vh";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1000);

},i*10);

}

}

</script>
